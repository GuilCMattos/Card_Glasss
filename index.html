<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Card UI Design</title>
    <script
      src="https://kit.fontawesome.com/0522b85e94.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="container">
        <div class="card">
          <div class="imgBx">
            <img
              style="width: 400px"
              src="perfilImage.jpg"
              alt="Perfil Image"
            />
          </div>
          <div class="content">
            <div class="contentBx">
              <h3>Guilherme Mattos <br /><span>Front End Student</span></h3>
            </div>
            <ul class="sci">
              <li style="--i: 1">
                <a
                  href="https://www.facebook.com/guilherme.carvalho.mattos/"
                  target="_blank"
                  ><i class="fab fa-facebook-f"></i
                ></a>
              </li>
              <li style="--i: 2">
                <a href="https://www.instagram.com/guimattozs/" target="_blank"
                  ><i class="fab fa-instagram"></i
                ></a>
              </li>
              <li style="--i: 3">
                <a href="https://twitter.com/mattosguil" target="_blank"
                  ><i class="fab fa-twitter"></i
                ></a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
